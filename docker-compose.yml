services:
  postgres:
    image: postgres:16-alpine
    container_name: oho-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-oho}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oho_dev_2026}
      POSTGRES_DB: ${POSTGRES_DB:-oho_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oho}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: oho-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: oho-minio
    restart: unless-stopped
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-oho_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-oho_minio_secret_2026}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 3

  minio-init:
    image: minio/mc:latest
    container_name: oho-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set oho http://minio:9000 $${MINIO_ROOT_USER:-oho_minio} $${MINIO_ROOT_PASSWORD:-oho_minio_secret_2026};
      mc mb oho/attachments --ignore-existing;
      mc mb oho/avatars --ignore-existing;
      mc anonymous set download oho/avatars;
      exit 0;
      "

  app:
    build:
      context: .
      dockerfile: infra/docker/app.Dockerfile
    container_name: oho-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-oho}:${POSTGRES_PASSWORD:-oho_dev_2026}@postgres:5432/${POSTGRES_DB:-oho_dev}
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-oho_minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-oho_minio_secret_2026}
      MINIO_BUCKET: attachments
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - app

volumes:
  postgres_data:
  redis_data:
  minio_data:
